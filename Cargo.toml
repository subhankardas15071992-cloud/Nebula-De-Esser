[package]
name = "nebula_desser"
version = "2.4.0"
edition = "2021"
authors = ["Nebula Audio"]
description = "Nebula DeEsser - Rust de-esser plugin for CLAP and VST3"

[lib]
crate-type = ["cdylib", "rlib"]

[workspace]
members = ["xtask"]
resolver = "2"

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", default-features = false, features = ["vst3"] }
nih_plug_egui = { git = "https://github.com/robbert-vdh/nih-plug.git" }
# ✅ REMOVED standalone egui dependency - use nih_plug_egui::egui instead
parking_lot = "0.12"
rustfft = "6.2"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
rand = "0.8"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
overflow-checks = false
debug-assertions = false
panic = "abort"

[profile.release.build-override]
opt-level = 3
codegen-units = 1

[target.'cfg(windows)'.profile.dev]
panic = "abort"
overflow-checks = false
