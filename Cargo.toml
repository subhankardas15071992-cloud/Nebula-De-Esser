[package]
name = "nebula_desser"
version = "2.4.0" # Increment version for the fixed release
edition = "2021"
authors = ["Nebula Audio", "Your Name/Organization (for the fixes)"]
description = "Nebula DeEsser v2 - Hyper-optimized 64-bit CLAP De-esser Plugin (Robust Industry Standard Fork)"

[lib]
crate-type = ["cdylib"]

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", default-features = false }
nih_plug_egui = { git = "https://github.com/robbert-vdh/nih-plug.git" }
egui = "0.29"
parking_lot = "0.12"
rustfft = "6.2"
serde = { version = "1.0", features = ["derive"] }
atomic-queue = "1.1.3" # For lock-free communication between audio and UI threads
arrayvec = { version = "0.7", features = ["serde"] } # For fixed-size buffers, avoiding heap allocations in audio thread

[dev-dependencies]
rand = "0.8"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
overflow-checks = false
debug-assertions = false

[profile.release.build-override]
opt-level = 3
codegen-units = 1
