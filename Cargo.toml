[package]
name = "nebula_desser"
version = "2.1.0"
edition = "2021"
authors = ["Nebula Audio"]
description = "Nebula DeEsser v2 - Hyper-optimized 64-bit CLAP De-esser Plugin"

[lib]
crate-type = ["cdylib"]

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", default-features = false }
nih_plug_egui = { git = "https://github.com/robbert-vdh/nih-plug.git" }
egui = "0.29"
parking_lot = "0.12"
rustfft = "6.2"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
rand = "0.8"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
overflow-checks = false
debug-assertions = false

[profile.release.build-override]
opt-level = 3
codegen-units = 1
