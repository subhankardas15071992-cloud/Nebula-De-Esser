name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
        rustup target add x86_64-unknown-linux-gnu
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libjack-jackd2-dev
    
    - name: Build
      run: |
        source $HOME/.cargo/env
        chmod +x build_linux.sh
        ./build_linux.sh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nebula-desser-linux
        path: target/bundled/*.clap

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
        rustup target add aarch64-apple-darwin x86_64-apple-darwin
    
    - name: Build
      run: |
        source $HOME/.cargo/env
        chmod +x build_mac.sh
        ./build_mac.sh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nebula-desser-macos
        path: target/bundled/*.clap

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://win.rustup.rs/ -o rustup-init.exe
        .\rustup-init.exe -y
        Add-Content $env:USERPROFILE\.profile "`$env:PATH += `";$env:USERPROFILE\.cargo\bin`""
        rustup target add x86_64-pc-windows-msvc
    
    - name: Build
      run: |
        $env:PATH += ";$env:USERPROFILE\.cargo\bin"
        .\build_windows.ps1
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nebula-desser-windows
        path: target/bundled/*.clap

  test:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
    
    - name: Run tests
      run: |
        source $HOME/.cargo/env
        cargo test --verbose
    
    - name: Run clippy
      run: |
        source $HOME/.cargo/env
        cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Check formatting
      run: |
        source $HOME/.cargo/env
        cargo fmt -- --check