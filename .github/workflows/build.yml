name: Build Nebula De-Esser (CLAP + VST3)

# Runs on every push / PR to main or master, and can be triggered manually.
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Must match the [package] name in your plugin's Cargo.toml
  PLUGIN_PACKAGE: nebula-de-esser

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — Universal Binary (Intel x86_64 + Apple Silicon arm64 merged via lipo)
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS Universal Binary
    runs-on: macos-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable (both macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - name: Cache Cargo registry + git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      # ── Source modification: add VST3 export to lib.rs ───────────────────────
      - name: Patch src/lib.rs — add VST3 support
        run: python3 .github/scripts/add_vst3.py

      # ── Build for each slice separately ──────────────────────────────────────
      - name: Build — x86_64-apple-darwin (Intel)
        run: cargo xtask bundle ${{ env.PLUGIN_PACKAGE }} --release --target x86_64-apple-darwin

      - name: Build — aarch64-apple-darwin (Apple Silicon)
        run: cargo xtask bundle ${{ env.PLUGIN_PACKAGE }} --release --target aarch64-apple-darwin

      # ── Merge slices into a single Universal binary with lipo ─────────────────
      - name: Create Universal binaries (lipo)
        run: bash .github/scripts/make_universal.sh

      - name: Upload macOS Universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-De-Esser-macOS-Universal
          path: target/universal/bundled/
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — 64-bit (x86_64-pc-windows-msvc)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + git sources
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Patch src/lib.rs — add VST3 support
        run: python3 .github/scripts/add_vst3.py

      - name: Build Windows plugins (CLAP + VST3)
        run: cargo xtask bundle ${{ env.PLUGIN_PACKAGE }} --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-De-Esser-Windows-x86_64
          path: target\bundled\
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux — 64-bit (x86_64-unknown-linux-gnu)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # nih-plug GUIs (egui / vizia / iced) need X11 / XCB / fontconfig headers.
      # Install them all up front so the build never fails mid-way.
      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgl-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-icccm4-dev \
            libxcb-dri2-0-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libglib2.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Patch src/lib.rs — add VST3 support
        run: python3 .github/scripts/add_vst3.py

      - name: Build Linux plugins (CLAP + VST3)
        run: cargo xtask bundle ${{ env.PLUGIN_PACKAGE }} --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-De-Esser-Linux-x86_64
          path: target/bundled/
          if-no-files-found: error
          retention-days: 30
