##############################################################################
#  Nebula De-Esser — CI Build Pipeline
#
#  Produces CLAP + VST3 bundles on macOS/Linux, VST3 on Windows,
#  plus AUv2 on macOS:
#    * macOS  — Universal Binary (Apple Silicon arm64 + Intel x86_64)
#               CLAP + VST3 + AUv2 component
#    * Windows — 64-bit  (x86_64-pc-windows-msvc), VST3 only
#    * Linux   — 64-bit  (x86_64-unknown-linux-gnu), CLAP + VST3
#
#  Finished bundles are uploaded as GitHub Actions Artifacts (90-day
#  retention). To download: Actions tab -> this run -> Artifacts section.
#
#  --------------------------------------------------------------------------
#  HOW THIS WORKS
#  --------------------------------------------------------------------------
#
#  cargo xtask bundle
#  ------------------
#  nih-plug uses the "cargo xtask" pattern: a small helper crate in xtask/
#  that is compiled on-the-fly and then run.  Three things must be present
#  in the repository for this to work:
#
#    1. xtask/Cargo.toml          (depends on nih_plug_xtask)
#    2. xtask/src/main.rs         (one-liner: nih_plug_xtask::main())
#    3. .cargo/config.toml        (alias: xtask = "run --package xtask --")
#
#  All three files are included in this PR / commit alongside this workflow.
#
#  AUv2 support
#  ------------
#  clap-wrapper exports AUv2 entrypoints from the same dynamic library as the
#  CLAP plugin. nih-plug's xtask currently bundles CLAP/VST3, so this workflow
#  creates the macOS .component bundle explicitly after bundle-universal has
#  produced both architecture builds.
#
#  LICENSE NOTE
#  ------------
#  NIH-plug's VST3 bindings link against the Steinberg VST3 SDK (GPLv3).
#  The VST3 artefact carries GPLv3 obligations; the CLAP artefact does not.
#  See https://github.com/robbert-vdh/nih-plug#licensing
##############################################################################

name: Build (CLAP + VST3 + AUv2, Windows VST3)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:          # allows manual runs from the Actions UI

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"


jobs:

  # ════════════════════════════════════════════════════════════════════════════
  #  macOS — Universal Binary (arm64 + x86_64)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    name: "macOS — Universal Binary"
    runs-on: macos-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Rust ────────────────────────────────────────────────────────────
      - name: Install Rust stable + both macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      # ── 3. Cache ───────────────────────────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      # ── 4. Build ───────────────────────────────────────────────────────────
      # `cargo xtask bundle-universal` is nih-plug's built-in command that
      # compiles for both architectures and merges them with lipo automatically.
      # MACOSX_DEPLOYMENT_TARGET=10.13 keeps the bundle compatible with
      # macOS High Sierra and later (standard minimum for audio plugins).
      - name: Build — macOS Universal (CLAP + VST3)
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"
        run: cargo xtask bundle-universal nebula_desser --release

      # ── 5. AUv2 component ─────────────────────────────────────────────────
      # clap-wrapper provides the AUv2 entrypoint symbols in the same dylib.
      # The component bundle is the missing macOS packaging layer.
      - name: Build — macOS Universal AUv2 component
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"
        run: |
          set -euo pipefail

          PLUGIN_NAME="nebula_desser"
          PLUGIN_DISPLAY="Nebula De-Esser"
          PLUGIN_VERSION="$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("Cargo.toml").read_text()
          print(re.search(r'^version\s*=\s*"([^"]+)"', text, re.M).group(1))
          PY
          )"
          BUNDLE_ID="audio.nebula.deesser"
          AUV2_TYPE="aufx"
          AUV2_SUBTYPE="NDeS"
          AUV2_MANUFACTURER="NbAu"
          AUV2_VERSION_INT="132096"

          ARM_LIB="target/aarch64-apple-darwin/release/lib${PLUGIN_NAME}.dylib"
          X86_LIB="target/x86_64-apple-darwin/release/lib${PLUGIN_NAME}.dylib"
          COMPONENT="target/bundled/${PLUGIN_DISPLAY}.component"
          COMPONENT_BIN="${COMPONENT}/Contents/MacOS/${PLUGIN_NAME}"

          if [[ ! -f "$ARM_LIB" || ! -f "$X86_LIB" ]]; then
            cargo build --release --target aarch64-apple-darwin
            cargo build --release --target x86_64-apple-darwin
          fi

          test -f "$ARM_LIB"
          test -f "$X86_LIB"

          mkdir -p "${COMPONENT}/Contents/MacOS"
          lipo -create "$ARM_LIB" "$X86_LIB" -output "$COMPONENT_BIN"

          nm -gU "$COMPONENT_BIN" | grep -q "_GetPluginFactoryAUV2"

          cat > "${COMPONENT}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>AudioComponents</key>
              <array>
                  <dict>
                      <key>description</key>
                      <string>${PLUGIN_DISPLAY}</string>
                      <key>factoryFunction</key>
                      <string>GetPluginFactoryAUV2</string>
                      <key>manufacturer</key>
                      <string>${AUV2_MANUFACTURER}</string>
                      <key>name</key>
                      <string>Nebula Audio: ${PLUGIN_DISPLAY}</string>
                      <key>subtype</key>
                      <string>${AUV2_SUBTYPE}</string>
                      <key>type</key>
                      <string>${AUV2_TYPE}</string>
                      <key>version</key>
                      <integer>${AUV2_VERSION_INT}</integer>
                  </dict>
              </array>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>${PLUGIN_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>${BUNDLE_ID}.auv2</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>${PLUGIN_DISPLAY}</string>
              <key>CFBundlePackageType</key>
              <string>BNDL</string>
              <key>CFBundleShortVersionString</key>
              <string>${PLUGIN_VERSION}</string>
              <key>CFBundleSignature</key>
              <string>${AUV2_MANUFACTURER}</string>
              <key>CFBundleVersion</key>
              <string>${PLUGIN_VERSION}</string>
              <key>CSResourcesFileMapped</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
          </dict>
          </plist>
          PLIST

          lipo -info "$COMPONENT_BIN"
          ls -la target/bundled/

      # ── 6. Upload ──────────────────────────────────────────────────────────
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-De-Esser_macOS-Universal
          path: target/bundled/
          if-no-files-found: error
          retention-days: 90


  # ════════════════════════════════════════════════════════════════════════════
  #  Windows — 64-bit
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    name: "Windows — 64-bit"
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry\index\
            ~\.cargo\registry\cache\
            ~\.cargo\git\db\
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      # Force Python to use UTF-8 on Windows so print() never hits cp1252.
      # This must be set as an env var for the *runner shell*, not just for
      # one step, so we set it globally via GITHUB_ENV.
      - name: Force Python UTF-8 output (Windows)
        shell: pwsh
        run: echo "PYTHONUTF8=1" >> $env:GITHUB_ENV

      - name: Build — Windows x86_64 (VST3 only)
        run: cargo xtask bundle nebula_desser --release

      - name: Keep Windows artifact VST3-only
        shell: pwsh
        run: |
          Get-ChildItem -Path target\bundled -Filter *.clap -Directory -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force
          if (-not (Get-ChildItem -Path target\bundled -Filter *.vst3 -Directory -ErrorAction SilentlyContinue)) {
            throw "Expected a VST3 bundle in target\bundled"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-De-Esser_Windows-x86_64
          path: target\bundled\
          if-no-files-found: error
          retention-days: 90


  # ════════════════════════════════════════════════════════════════════════════
  #  Linux — 64-bit
  # ════════════════════════════════════════════════════════════════════════════
  build-linux:
    name: "Linux — 64-bit"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # nih-plug GUI back-ends (egui / vizia / iced) require X11, XCB,
      # fontconfig, and OpenGL headers.  Install the full set up-front so
      # the build never stalls mid-compilation on a missing header.
      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgl-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-icccm4-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libasound2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build — Linux x86_64 (CLAP + VST3)
        run: cargo xtask bundle nebula_desser --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-De-Esser_Linux-x86_64
          path: target/bundled/
          if-no-files-found: error
          retention-days: 90
