# This file tells nih_plug_xtask the human-readable display name for the
# plugin bundle (the .clap / .vst3 folder names on disk).
#
# Format:
#   [<cargo-package-name>]   ← must match [package] name in Cargo.toml exactly
#   name = "<Display Name>"  ← used for the bundle folder name on all platforms
#
# Example: if name = "Nebula DeEsser", the bundles are named:
#   Nebula DeEsser.clap
#   Nebula DeEsser.vst3

[nebula_desser]
name = "Nebula DeEsser"
